<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="dynamicTitle">Banhsungboo</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <!-- CSS giữ nguyên như cũ, chỉ thay text -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Nunito:wght@400;600;700&family=Fredoka+One&family=Comic+Neue:wght@400;700&family=Open+Sans:wght@400;600;700&family=Noto+Sans:wght@400;500;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>/* GIỮ NGUYÊN CSS */</style>
</head>
<body>

<header class="main-header">
    <div class="container">
        <div class="logo-area">
            <img id="siteLogo" class="logo-img" src="" alt="Logo" style="display:none;">
            <span id="shopNameDisplay" class="shop-name-text">Banhsungboo</span>
        </div>
    </div>
</header>

<!-- Phần thông báo -->
<div class="container">
    <div id="notificationBanner" class="notification-banner">
        <div id="notificationText" class="notification-text">🎉 Chào mừng bạn đến với Banhsungboo! 🎉<br>🎞️ Cửa hàng phim và máy ảnh chất lượng. Giao hàng toàn quốc.</div>
    </div>
</div>

<!-- ... Các phần khác giữ nguyên ... -->

<footer class="footer" id="footerText"></footer>

<!-- Modals giữ nguyên -->

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCdJVcEq5GCBi3nxi52KmHx9XoJz9U-GSw",
        authDomain: "banhsungboo.firebaseapp.com",
        databaseURL: "https://banhsungboo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "banhsungboo",
        storageBucket: "banhsungboo.firebasestorage.app",
        messagingSenderId: "983206724851",
        appId: "1:983206724851:web:ae5a84fdc8c00eac426386",
        measurementId: "G-2SD78JC9YE"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Hàm tạo dữ liệu mẫu với tên Banhsungboo
    async function initializeDefaultData() {
        // ... giữ nguyên logic nhưng thay text "FilmStore Cartoon" thành "Banhsungboo Cartoon"
        const configSnap = await db.ref('config').once('value');
        if (!configSnap.exists()) {
            await db.ref('config').set({
                shopName: "Banhsungboo",
                siteTitle: "Banhsungboo",
                // ... các cấu hình khác
                footerText: "© 2025 Banhsungboo - Cửa hàng phim & máy ảnh chất lượng",
                // ...
            });
        }
        // ... các phần khác
    }
    // ... phần còn lại giữ nguyên
</script>
</body>
</html>
